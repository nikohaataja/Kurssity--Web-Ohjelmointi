<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock item investment calculator</title>
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <div id="toppomi">
        <header>Deadlock item investment calculator</header>
    </div>
    <main class = "content">
        <h1>Select your items</h1>
        <div id="formbox">
            <label for="field">Item</label>
            <input type="text" id="field">
            <button id="haku">Select item</button>
            <ul id="build">Build:</ul>
        </div>
        <button id="calculate"> Calculate build</button>
        <div id="results">
            <h2 id="total">Total investment:</h2>
            <div id="gun" class="investment-box">Gun investment:</div>
            <div id="spirit" class="investment-box">Spirit investment:</div>
            <div id="vitality" class="investment-box">Vitality investment:</div>
        </div>
        <button id="reset"> Reset build</button>
    </main>
    <script src = "../js/script.js"></script>
</body>
</html>
